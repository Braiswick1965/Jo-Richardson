<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>360° Virtual Tour - Jo Richardson School</title>
    <style>
        /* ============================================
                   RESET & BASE
                   ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        /* ============================================
                   VIEWER CONTAINER
                   ============================================ */
        #viewer-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #0a0a0f;
            cursor: grab;
        }

        #viewer-container.dragging {
            cursor: grabbing;
        }

        #viewer-container canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ============================================
                   LOADER WITH PROGRESS BAR
                   ============================================ */
        #loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            z-index: 10;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-container {
            max-width: 320px;
            width: 80%;
        }

        .loader-bar-bg {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 20px;
        }

        .loader-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffffff, rgba(255, 255, 255, 0.4));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .loader-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .loader-progress {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            margin-top: 8px;
            font-variant-numeric: tabular-nums;
        }

        .loader-scene-name {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            margin-bottom: 4px;
        }

        /* ============================================
                   SCENE SELECTOR (Bottom Left) - Lighter
                   ============================================ */
        #scene-selector {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 20;
            background: rgba(30, 30, 40, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px;
            max-height: 80vh;
            overflow-y: auto;
            min-width: 200px;
            max-width: 260px;
            box-shadow: 0 16px 60px rgba(0, 0, 0, 0.8);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
        }

        #scene-selector::-webkit-scrollbar {
            width: 3px;
        }

        #scene-selector::-webkit-scrollbar-track {
            background: transparent;
        }

        #scene-selector::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        .scene-selector-header {
            padding: 8px 12px 12px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s ease;
        }

        .scene-selector-header:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .scene-selector-header .count {
            font-weight: 400;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.3);
        }

        .scene-selector-header .toggle-icon {
            font-size: 0.9rem;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        #scene-selector.collapsed .scene-selector-header .toggle-icon {
            transform: rotate(-90deg);
        }

        .scene-selector-toggle {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0 4px;
            display: none;
            transition: transform 0.3s ease;
        }

        .scene-selector-toggle:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        /* Hide scene items when collapsed */
        #scene-selector.collapsed .scene-item,
        #scene-selector.collapsed .scene-header {
            display: none;
        }

        #scene-selector.collapsed .scene-selector-header {
            border-bottom: none;
            padding-bottom: 8px;
        }

        .scene-header {
            padding: 12px 12px 4px 12px;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
            cursor: default;
            pointer-events: none;
        }

        .scene-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            margin: 2px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
            position: relative;
        }

        .scene-item::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .scene-item:hover {
            color: #fff;
        }

        .scene-item:hover::before {
            opacity: 1;
        }

        .scene-item.active {
            color: #fff;
        }

        .scene-item.active::before {
            opacity: 1;
            background: rgba(255, 255, 255, 0.12);
        }

        .scene-item .thumb {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            position: relative;
            z-index: 1;
            transition: transform 0.3s ease;
        }

        .scene-item:hover .thumb {
            transform: scale(1.05);
        }

        .scene-item .scene-name {
            position: relative;
            z-index: 1;
            flex: 1;
        }

        .scene-item .badge {
            position: relative;
            z-index: 1;
            font-size: 0.5rem;
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 8px;
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.3px;
        }

        .scene-item.active .badge {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.5);
        }

        /* Active indicator dot */
        .scene-item.active::after {
            content: '';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #fff;
            opacity: 0.4;
            z-index: 1;
        }

        /* ============================================
                   CONTROLS (Bottom Center) - No Fullscreen
                   ============================================ */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            align-items: center;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 4px 6px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            z-index: 20;
            user-select: none;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.03);
            border: none;
            color: rgba(255, 255, 255, 0.5);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.2s ease;
            font-family: inherit;
            position: relative;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .control-btn:active {
            transform: scale(0.92);
        }

        .control-btn .tooltip {
            position: absolute;
            bottom: calc(100% + 12px);
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.6);
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .control-btn:hover .tooltip {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        .control-divider {
            width: 1px;
            height: 24px;
            background: rgba(255, 255, 255, 0.04);
            margin: 0 2px;
        }

        .control-label {
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.55rem;
            font-weight: 400;
            letter-spacing: 0.8px;
            padding: 0 10px;
            white-space: nowrap;
            text-transform: uppercase;
        }

        /* ============================================
                   ZOOM INDICATOR - Premium
                   ============================================ */
        #zoom-indicator {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            z-index: 15;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.6rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            pointer-events: none;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 16px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        #zoom-indicator.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ============================================
                   COMPASS - Premium
                   ============================================ */
        #compass {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 15;
            pointer-events: none;
            opacity: 0.3;
            transition: opacity 0.3s ease;
        }

        #compass svg {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.3));
        }

        /* ============================================
                   LOGO (Bottom Right) - 50% Bigger
                   ============================================ */
        #logo {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 15;
            pointer-events: none;
            opacity: 0.6;
            transition: opacity 0.4s ease;
        }

        #logo img {
            height: 54px;
            /* Was 36px - now 50% bigger */
            width: auto;
            filter: brightness(0) invert(1);
        }

        #logo:hover {
            opacity: 1;
        }

        /* ============================================
                   KEYBOARD SHORTCUTS HELP
                   ============================================ */
        #help-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        #help-overlay.visible {
            display: flex;
        }

        #help-overlay .help-content {
            background: rgba(10, 10, 15, 0.9);
            border-radius: 20px;
            padding: 40px 48px;
            max-width: 480px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        #help-overlay h2 {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
            color: #fff;
        }

        #help-overlay .shortcut {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }

        #help-overlay .shortcut .key {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            background: rgba(255, 255, 255, 0.06);
            padding: 0 10px;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        #help-overlay .close-help {
            margin-top: 16px;
            background: rgba(255, 255, 255, 0.06);
            border: none;
            color: rgba(255, 255, 255, 0.5);
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        #help-overlay .close-help:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* ============================================
                   ERROR MESSAGE
                   ============================================ */
        #error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            text-align: center;
            z-index: 8;
            padding: 24px 32px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: none;
            max-width: 400px;
        }

        #error-message .icon {
            font-size: 2rem;
            display: block;
            margin-bottom: 12px;
        }

        /* ============================================
                   RESPONSIVE
                   ============================================ */
        @media (max-width: 768px) {
            #scene-selector {
                bottom: 80px;
                left: 16px;
                right: 16px;
                min-width: unset;
                max-width: unset;
                max-height: 45vh;
                padding: 6px;
                border-radius: 14px;
            }

            .scene-selector-header {
                padding: 6px 10px 10px 10px;
                font-size: 0.65rem;
            }

            .scene-item {
                padding: 6px 10px;
                font-size: 0.8rem;
                gap: 8px;
            }

            .scene-item .thumb {
                width: 28px;
                height: 28px;
                font-size: 14px;
            }

            #controls {
                bottom: 16px;
                padding: 3px 5px;
                gap: 1px;
            }

            .control-btn {
                width: 32px;
                height: 32px;
                font-size: 0.85rem;
            }

            .control-label {
                display: none;
            }

            .control-divider {
                height: 18px;
            }

            #logo {
                bottom: 80px;
                right: 16px;
            }

            #logo img {
                height: 40px;
                /* 50% bigger than original 28px on mobile */
            }

            #zoom-indicator {
                bottom: 80px;
                font-size: 0.5rem;
                padding: 4px 12px;
            }

            #compass {
                top: 16px;
                right: 16px;
            }

            #compass svg {
                width: 32px;
                height: 32px;
            }

            .control-btn .tooltip {
                display: none;
            }

            #help-overlay .help-content {
                padding: 28px 20px;
            }
        }

        @media (max-width: 480px) {
            #scene-selector {
                bottom: 72px;
                left: 12px;
                right: 12px;
                padding: 4px;
                max-height: 40vh;
            }

            .scene-item {
                padding: 4px 8px;
                font-size: 0.75rem;
                gap: 6px;
            }

            .scene-item .thumb {
                width: 24px;
                height: 24px;
                font-size: 12px;
            }

            #controls {
                bottom: 12px;
                padding: 2px 4px;
            }

            .control-btn {
                width: 28px;
                height: 28px;
                font-size: 0.75rem;
            }

            #logo img {
                height: 33px;
                /* 50% bigger than original 22px on mobile */
            }

            #zoom-indicator {
                bottom: 72px;
                font-size: 0.45rem;
                padding: 3px 10px;
            }

            #compass svg {
                width: 28px;
                height: 28px;
            }
        }

        /* ============================================
                   UTILITY
                   ============================================ */
        .hidden {
            display: none !important;
        }

        /* Smooth transitions for scene changes */
        #viewer-container canvas {
            transition: opacity 0.6s ease;
        }
    </style>
</head>
<body>

    <!-- ============================================
    VIEWER
    ============================================ -->
    <div id="viewer-container">

        <!-- LOADER WITH PROGRESS BAR -->
        <div id="loader">
            <div class="loader-container">
                <div class="loader-scene-name" id="loader-scene-name">Preparing...</div>
                <div class="loader-text" id="loader-text">Loading 360° Experience</div>
                <div class="loader-bar-bg">
                    <div class="loader-bar" id="loader-bar"></div>
                </div>
                <div class="loader-progress" id="loader-progress">0%</div>
            </div>
        </div>

        <!-- ERROR MESSAGE -->
        <div id="error-message">
            <span class="icon">🔄</span>
            <div>Unable to load panorama</div>
        </div>

        <!-- COMPASS -->
        <div id="compass">
            <svg viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="18" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
                <circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.3)"/>
                <path d="M20 4 L23 14 L20 12 L17 14 L20 4Z" fill="#ffffff" opacity="0.6"/>
                <path d="M20 4 L20 12" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
                <path d="M20 36 L17 26 L20 28 L23 26 L20 36Z" fill="rgba(255,255,255,0.15)"/>
            </svg>
        </div>

        <!-- ZOOM INDICATOR -->
        <div id="zoom-indicator">🔍 Scroll to zoom</div>

        <!-- LOGO (Bottom Right) - 50% Bigger -->
        <div id="logo">
            <img src="https://static.wixstatic.com/media/42e05c_12592fc2a93e4bf0b1e30417fc3a3694~mv2.png" alt="Logo" />
        </div>

        <!-- SCENE SELECTOR (Bottom Left) - Lighter -->
        <div id="scene-selector">
            <div class="scene-selector-header" id="scene-selector-header">
                <span>📍 Scenes <span class="count" id="scene-count"></span></span>
                <span class="toggle-icon">▾</span>
            </div>
            <div id="scene-list">
                <!-- Scenes will be rendered here -->
            </div>
        </div>

        <!-- CONTROLS (Bottom Center) - No Fullscreen Button -->
        <div id="controls">
            <button class="control-btn" id="reset-btn" title="Reset View">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9m0 0v6m0-6h-6"/>
                </svg>
                <span class="tooltip">Reset View (R)</span>
            </button>

            <div class="control-divider"></div>

            <button class="control-btn" id="zoom-in-btn" title="Zoom In">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                    <path d="M11 8v6"/>
                    <path d="M8 11h6"/>
                </svg>
                <span class="tooltip">Zoom In (+)</span>
            </button>

            <button class="control-btn" id="zoom-out-btn" title="Zoom Out">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                    <path d="M8 11h6"/>
                </svg>
                <span class="tooltip">Zoom Out (-)</span>
            </button>

            <div class="control-divider"></div>

            <button class="control-btn" id="help-btn" title="Help">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                    <path d="M12 17h.01"/>
                </svg>
                <span class="tooltip">Help (?)</span>
            </button>

            <div class="control-divider"></div>

            <span class="control-label">Drag to Explore</span>
        </div>

        <!-- HELP OVERLAY -->
        <div id="help-overlay">
            <div class="help-content">
                <h2>⌨️ Keyboard Shortcuts</h2>
                <div class="shortcut"><span>Reset View</span><span class="key">R</span></div>
                <div class="shortcut"><span>Zoom In</span><span class="key">+</span></div>
                <div class="shortcut"><span>Zoom Out</span><span class="key">-</span></div>
                <div class="shortcut"><span>Toggle Scenes</span><span class="key">S</span></div>
                <div class="shortcut"><span>Close Help</span><span class="key">ESC</span></div>
                <button class="close-help" id="close-help">Close</button>
            </div>
        </div>
    </div>

    <!-- ============================================
    THREE.JS
    ============================================ -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <!-- ============================================
    MAIN APPLICATION
    ============================================ -->
    <script type="module">
        // =============================================
        // IMPORTS
        // =============================================
        import * as THREE from 'three';

        // =============================================
        // SCENE DATA
        // =============================================
        const SCENES = [
            {
                id: "performance-spaces",
                name: "🏛️ Performance Spaces",
                isHeader: true
            },
            {
                id: "auditorium",
                name: "Auditorium",
                image: "images/auditorium.jpg",
                icon: "🎪"
            },
            {
                id: "drama-room",
                name: "Drama Room",
                image: "images/drama-room.jpg",
                icon: "🎬"
            },
            {
                id: "large-drama-room-light",
                name: "Large Drama Room (Light)",
                image: "images/large-drama-room-light.jpg",
                icon: "☀️"
            },
            {
                id: "large-drama-room-dark",
                name: "Large Drama Room (Dark)",
                image: "images/large-drama-room-dark.jpg",
                icon: "🌙"
            },
            {
                id: "small-drama-room",
                name: "Small Drama Room",
                image: "images/small-drama-room.jpg",
                icon: "🎭"
            },
            {
                id: "teaching-areas",
                name: "📚 Teaching Areas",
                isHeader: true
            },
            {
                id: "class-room",
                name: "Class Room",
                image: "images/class-room.jpg",
                icon: "📚"
            },
            {
                id: "dance-studio",
                name: "Dance Studio",
                image: "images/dance-studio.jpg",
                icon: "💃"
            },
            {
                id: "community-spaces",
                name: "🤝 Community Spaces",
                isHeader: true
            },
            {
                id: "sixthform-community-room",
                name: "Sixthform Community Room",
                image: "images/sixthform-community-room.jpg",
                icon: "🎓"
            },
            {
                id: "sports-hall",
                name: "Sports Hall",
                image: "images/sports-hall.jpg",
                icon: "🏀"
            }
        ];

        // =============================================
        // DOM REFS
        // =============================================
        const container = document.getElementById('viewer-container');
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');
        const loaderSceneName = document.getElementById('loader-scene-name');
        const loaderBar = document.getElementById('loader-bar');
        const loaderProgress = document.getElementById('loader-progress');
        const errorMsg = document.getElementById('error-message');
        const sceneList = document.getElementById('scene-list');
        const sceneSelector = document.getElementById('scene-selector');
        const sceneSelectorHeader = document.getElementById('scene-selector-header');
        const sceneCount = document.getElementById('scene-count');
        const zoomIndicator = document.getElementById('zoom-indicator');
        const helpOverlay = document.getElementById('help-overlay');

        // =============================================
        // STATE
        // =============================================
        const state = {
            scenes: SCENES,
            currentScene: null,
            isDragging: false,
            prevPos: { x: 0, y: 0 },
            yaw: 0,
            pitch: 0,
            fov: 110,
            minFov: 25,
            maxFov: 110,
            sensitivity: 0.005,
            isLoading: false,
            zoomTimeout: null,
            autoRotate: true,
            autoRotateSpeed: 0.3,
            idleTime: 0,
            idleTimeout: null,
            isSelectorCollapsed: false,
        };

        const PITCH_LIMIT = Math.PI / 2 - 0.05;

        // =============================================
        // SETUP THREE.JS
        // =============================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: false,
            powerPreference: 'high-performance',
        });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        container.prepend(renderer.domElement);

        const sphereGeometry = new THREE.SphereGeometry(500, 64, 64);
        let sphereMesh = null;
        let textureLoaded = false;
        let isTransitioning = false;

        // =============================================
        // CAMERA UPDATE
        // =============================================
        function updateCamera() {
            const radius = 1;
            const x = radius * Math.cos(state.pitch) * Math.sin(state.yaw);
            const y = radius * Math.sin(state.pitch);
            const z = radius * Math.cos(state.pitch) * Math.cos(state.yaw);
            camera.lookAt(x, y, z);
            camera.fov = state.fov;
            camera.updateProjectionMatrix();

            updateCompass();
        }

        // =============================================
        // COMPASS
        // =============================================
        function updateCompass() {
            const compass = document.getElementById('compass');
            const rotation = (state.yaw * 180 / Math.PI) % 360;
            compass.style.transform = `rotate(${-rotation}deg)`;
        }

        // =============================================
        // ZOOM INDICATOR
        // =============================================
        function showZoomIndicator(message) {
            if (message) {
                zoomIndicator.textContent = message;
            }
            zoomIndicator.classList.add('visible');
            clearTimeout(state.zoomTimeout);
            state.zoomTimeout = setTimeout(() => {
                zoomIndicator.classList.remove('visible');
                setTimeout(() => {
                    zoomIndicator.textContent = '🔍 Scroll to zoom';
                }, 500);
            }, 2000);
        }

        // =============================================
        // AUTO-ROTATE
        // =============================================
        let autoRotateId = null;

        function startAutoRotate() {
            if (autoRotateId) cancelAnimationFrame(autoRotateId);
            state.autoRotate = true;

            function rotate() {
                if (!state.autoRotate || !textureLoaded) {
                    autoRotateId = null;
                    return;
                }
                state.yaw += state.autoRotateSpeed * 0.001;
                updateCamera();
                autoRotateId = requestAnimationFrame(rotate);
            }
            rotate();
        }

        function stopAutoRotate() {
            state.autoRotate = false;
            if (autoRotateId) {
                cancelAnimationFrame(autoRotateId);
                autoRotateId = null;
            }
        }

        function resetIdleTimer() {
            if (!state.autoRotate) {
                clearTimeout(state.idleTimeout);
                state.idleTimeout = setTimeout(() => {
                    if (!state.isDragging) {
                        startAutoRotate();
                    }
                }, 3000);
            }
        }

        // =============================================
        // TOGGLE SCENE SELECTOR
        // =============================================
        function toggleSceneSelector() {
            state.isSelectorCollapsed = !state.isSelectorCollapsed;
            sceneSelector.classList.toggle('collapsed', state.isSelectorCollapsed);
        }

        // =============================================
        // RENDER SCENE LIST
        // =============================================
        function renderSceneList() {
            sceneList.innerHTML = '';
            let firstScene = null;
            let totalScenes = 0;

            state.scenes.forEach((sceneData, index) => {
                if (sceneData.isHeader) {
                    const header = document.createElement('div');
                    header.className = 'scene-header';
                    header.textContent = sceneData.name;
                    sceneList.appendChild(header);
                    return;
                }

                totalScenes++;

                const btn = document.createElement('button');
                btn.className = 'scene-item';
                if (firstScene === null) {
                    btn.classList.add('active');
                    firstScene = sceneData;
                }
                btn.dataset.index = index;

                const thumb = document.createElement('span');
                thumb.className = 'thumb';
                thumb.textContent = sceneData.icon || '📍';

                const name = document.createElement('span');
                name.className = 'scene-name';
                name.textContent = sceneData.name;

                const badge = document.createElement('span');
                badge.className = 'badge';
                badge.textContent = '360°';

                btn.appendChild(thumb);
                btn.appendChild(name);
                btn.appendChild(badge);

                btn.addEventListener('click', () => {
                    if (state.currentScene?.id === sceneData.id) return;
                    loadPanorama(sceneData);
                    document.querySelectorAll('.scene-item').forEach(el => el.classList.remove('active'));
                    btn.classList.add('active');
                    // Auto-collapse on mobile after selection
                    if (window.innerWidth <= 768) {
                        toggleSceneSelector();
                    }
                });

                sceneList.appendChild(btn);
            });

            sceneCount.textContent = totalScenes;

            if (firstScene) {
                loadPanorama(firstScene);
            }
        }

        // =============================================
        // LOAD PANORAMA WITH PROGRESS
        // =============================================
        function loadPanorama(sceneData) {
            if (state.isLoading || isTransitioning) return;
            state.isLoading = true;
            state.currentScene = sceneData;

            loader.classList.remove('hidden');
            loaderSceneName.textContent = sceneData.name;
            loaderText.textContent = 'Loading 360° Experience';
            loaderBar.style.width = '0%';
            loaderProgress.textContent = '0%';
            errorMsg.style.display = 'none';

            stopAutoRotate();

            const imageUrl = sceneData.image;

            const xhr = new XMLHttpRequest();
            xhr.open('GET', imageUrl, true);
            xhr.responseType = 'blob';

            xhr.onprogress = (event) => {
                if (event.total > 0) {
                    const percent = Math.round((event.loaded / event.total) * 100);
                    loaderBar.style.width = `${percent}%`;
                    loaderProgress.textContent = `${percent}%`;
                    if (percent < 90) {
                        loaderText.textContent = `Loading... ${percent}%`;
                    }
                }
            };

            xhr.onload = () => {
                if (xhr.status === 200) {
                    const blob = xhr.response;
                    const url = URL.createObjectURL(blob);
                    const img = new Image();

                    img.onload = () => {
                        URL.revokeObjectURL(url);
                        loaderText.textContent = 'Creating panorama...';
                        loaderBar.style.width = '100%';
                        loaderProgress.textContent = '100%';

                        const texture = new THREE.Texture(img);
                        texture.colorSpace = THREE.SRGBColorSpace;
                        texture.needsUpdate = true;

                        fadeToNewScene(texture);
                        state.isLoading = false;
                    };

                    img.onerror = () => {
                        handleError(`Failed to decode ${sceneData.name}`);
                        state.isLoading = false;
                    };

                    img.src = url;
                } else {
                    handleError(`HTTP ${xhr.status}: ${xhr.statusText}`);
                    state.isLoading = false;
                }
            };

            xhr.onerror = () => {
                handleError(`Failed to load ${sceneData.name}`);
                state.isLoading = false;
            };

            xhr.send();
        }

        // =============================================
        // FADE TRANSITION
        // =============================================
        function fadeToNewScene(texture) {
            isTransitioning = true;

            texture.flipX = true;

            const newMaterial = new THREE.MeshBasicMaterial({
                map: texture,
                side: THREE.BackSide,
                color: 0xffffff,
                transparent: true,
                opacity: 0,
            });

            const newMesh = new THREE.Mesh(sphereGeometry, newMaterial);
            scene.add(newMesh);

            let opacity = 0;
            const fadeSpeed = 0.03;

            function fadeIn() {
                opacity += fadeSpeed;
                if (opacity >= 1) {
                    opacity = 1;
                    newMaterial.opacity = 1;

                    if (sphereMesh) {
                        scene.remove(sphereMesh);
                        sphereMesh.geometry.dispose();
                        sphereMesh.material.dispose();
                    }

                    sphereMesh = newMesh;
                    textureLoaded = true;
                    isTransitioning = false;

                    state.yaw = 0;
                    state.pitch = 0;
                    state.fov = 110;
                    updateCamera();

                    loader.classList.add('hidden');
                    resetIdleTimer();

                    console.log(`✅ Loaded: ${state.currentScene?.name}`);
                    return;
                }

                newMaterial.opacity = opacity;
                requestAnimationFrame(fadeIn);
            }

            fadeIn();
        }

        function handleError(message) {
            console.error('❌ Error:', message);
            loader.classList.add('hidden');
            errorMsg.style.display = 'block';
            errorMsg.querySelector('div').textContent = message;
            state.isLoading = false;
            isTransitioning = false;
        }

        // =============================================
        // POINTER EVENTS
        // =============================================
        function getPointerPos(event) {
            if (event.touches) {
                return { x: event.touches[0].clientX, y: event.touches[0].clientY };
            }
            return { x: event.clientX, y: event.clientY };
        }

        function onPointerDown(event) {
            state.isDragging = true;
            container.classList.add('dragging');
            const pos = getPointerPos(event);
            state.prevPos.x = pos.x;
            state.prevPos.y = pos.y;
            stopAutoRotate();
        }

        function onPointerMove(event) {
            if (!state.isDragging || !textureLoaded || isTransitioning) return;
            const pos = getPointerPos(event);
            const deltaX = pos.x - state.prevPos.x;
            const deltaY = pos.y - state.prevPos.y;

            state.yaw -= deltaX * state.sensitivity;
            state.pitch -= deltaY * state.sensitivity;
            state.pitch = Math.max(-PITCH_LIMIT, Math.min(PITCH_LIMIT, state.pitch));

            state.prevPos.x = pos.x;
            state.prevPos.y = pos.y;
            updateCamera();
            resetIdleTimer();
        }

        function onPointerUp() {
            state.isDragging = false;
            container.classList.remove('dragging');
            resetIdleTimer();
        }

        renderer.domElement.addEventListener('mousedown', onPointerDown);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('mouseup', onPointerUp);

        renderer.domElement.addEventListener('touchstart', onPointerDown, { passive: true });
        window.addEventListener('touchmove', onPointerMove, { passive: true });
        window.addEventListener('touchend', onPointerUp, { passive: true });

        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

        // =============================================
        // MOUSE WHEEL ZOOM - FASTER
        // =============================================
        function onWheelZoom(event) {
            if (!textureLoaded || isTransitioning) return;
            event.preventDefault();

            const delta = event.deltaY > 0 ? 1 : -1;
            const zoomAmount = delta * 6;

            state.fov = Math.max(state.minFov, Math.min(state.maxFov, state.fov + zoomAmount));
            updateCamera();
            showZoomIndicator();
            resetIdleTimer();
        }

        renderer.domElement.addEventListener('wheel', onWheelZoom, { passive: false });

        // =============================================
        // BUTTON HANDLERS
        // =============================================
        document.getElementById('reset-btn').addEventListener('click', () => {
            state.yaw = 0;
            state.pitch = 0;
            state.fov = 110;
            updateCamera();
            showZoomIndicator('↺ View reset');
            resetIdleTimer();
        });

        document.getElementById('zoom-in-btn').addEventListener('click', () => {
            state.fov = Math.max(state.minFov, state.fov - 5);
            updateCamera();
            showZoomIndicator('🔍 Zoom in');
            resetIdleTimer();
        });

        document.getElementById('zoom-out-btn').addEventListener('click', () => {
            state.fov = Math.min(state.maxFov, state.fov + 5);
            updateCamera();
            showZoomIndicator('🔍 Zoom out');
            resetIdleTimer();
        });

        // Scene selector header click to toggle
        sceneSelectorHeader.addEventListener('click', toggleSceneSelector);

        document.getElementById('help-btn').addEventListener('click', () => {
            helpOverlay.classList.toggle('visible');
        });

        document.getElementById('close-help').addEventListener('click', () => {
            helpOverlay.classList.remove('visible');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') document.getElementById('reset-btn').click();
            if (e.key === '+' || e.key === '=') document.getElementById('zoom-in-btn').click();
            if (e.key === '-') document.getElementById('zoom-out-btn').click();
            if (e.key === 's' || e.key === 'S') {
                e.preventDefault();
                toggleSceneSelector();
            }
            if (e.key === '?') {
                e.preventDefault();
                helpOverlay.classList.toggle('visible');
            }
            if (e.key === 'Escape') {
                helpOverlay.classList.remove('visible');
            }
        });

        helpOverlay.addEventListener('click', (e) => {
            if (e.target === helpOverlay) {
                helpOverlay.classList.remove('visible');
            }
        });

        // =============================================
        // RESIZE
        // =============================================
        function onResize() {
            const width = container.clientWidth;
            const height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }

        window.addEventListener('resize', onResize);

        // =============================================
        // ANIMATION LOOP
        // =============================================
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // =============================================
        // INIT
        // =============================================
        updateCamera();
        renderSceneList();

        setTimeout(() => {
            showZoomIndicator();
        }, 2500);

        console.log('🌐 360° Virtual Tour v3.0 - Premium Edition');
        console.log(`📸 ${SCENES.filter(s => !s.isHeader).length} scenes available`);
        console.log('🔧 Mirror fix applied');
        console.log('🖱️ Scroll to zoom (faster)');
        console.log('🔄 Auto-rotate enabled');
        console.log('⌨️ Press ? for keyboard shortcuts');
        console.log('📷 Default view: Fully zoomed out (FOV: 110°)');
        console.log('📂 Click "Scenes" header to toggle menu');
        console.log('⌨️ Press S to toggle scenes');

        // =============================================
// DISABLE RIGHT-CLICK
// =============================================
document.addEventListener('contextmenu', (e) => {
    e.preventDefault();
});
        
    </script>
</body>
</html>
